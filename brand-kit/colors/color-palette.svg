<svg width="900" height="280" viewBox="0 0 900 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .label { font-size: 11px; font-weight: 600; fill: #737373; letter-spacing: 0.05em; text-transform: uppercase; }
    .hex { font-size: 12px; fill: #737373; font-family: monospace; }
  </style>

  <!-- Row 1: Primary colors -->
  <rect x="0" y="0" width="200" height="120" rx="8" fill="#ff6347"/>
  <text x="16" y="150" class="label">Accent</text>
  <text x="16" y="168" class="hex">#ff6347</text>

  <rect x="220" y="0" width="200" height="120" rx="8" fill="#ffffff" stroke="#262626" stroke-width="1"/>
  <text x="236" y="150" class="label">Foreground</text>
  <text x="236" y="168" class="hex">#ffffff</text>

  <rect x="440" y="0" width="200" height="120" rx="8" fill="#000000" stroke="#262626" stroke-width="1"/>
  <text x="456" y="150" class="label">Background</text>
  <text x="456" y="168" class="hex">#000000</text>

  <rect x="660" y="0" width="200" height="120" rx="8" fill="#0a0a0a" stroke="#262626" stroke-width="1"/>
  <text x="676" y="150" class="label">Card</text>
  <text x="676" y="168" class="hex">#0a0a0a</text>

  <!-- Row 2: Secondary colors -->
  <rect x="0" y="190" width="155" height="80" rx="6" fill="#141414" stroke="#262626" stroke-width="1"/>
  <text x="12" y="222" class="hex" style="fill:#999">#141414</text>
  <text x="12" y="258" class="label">Secondary</text>

  <rect x="175" y="190" width="155" height="80" rx="6" fill="#1a1a1a" stroke="#262626" stroke-width="1"/>
  <text x="187" y="222" class="hex" style="fill:#999">#1a1a1a</text>
  <text x="187" y="258" class="label">Muted</text>

  <rect x="350" y="190" width="155" height="80" rx="6" fill="#262626" stroke="#333" stroke-width="1"/>
  <text x="362" y="222" class="hex" style="fill:#999">#262626</text>
  <text x="362" y="258" class="label">Border</text>

  <rect x="525" y="190" width="155" height="80" rx="6" fill="#22c55e"/>
  <text x="537" y="222" class="hex" style="fill:#fff">#22c55e</text>
  <text x="537" y="258" class="label">Success</text>

  <rect x="700" y="190" width="155" height="80" rx="6" fill="#ef4444"/>
  <text x="712" y="222" class="hex" style="fill:#fff">#ef4444</text>
  <text x="712" y="258" class="label">Destructive</text>
</svg>
